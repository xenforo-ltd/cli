services:
  xf:
    build:
      target: development
    extra_hosts:
      - host.docker.internal:host-gateway
    volumes:
      - .:/var/www/html
      - ./src/config.docker.php:/var/www/html/src/config.php:ro

  web:
    volumes:
      - .:/var/www/html:ro

  adminer:
    image: adminer:${ADMINER_VERSION:-4}-fastcgi
