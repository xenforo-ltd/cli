<!doctype html>
<html lang="en">

<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<meta name="color-scheme" content="light dark">

	<title>{{ph "http.error.status_text"}}</title>

	<style>
		:root {
			--body-color: hsl(210 11% 15%);
			--body-background: hsl(210 16% 93%);
			--border-color: hsl(0 0 0% / 0.175);
			--main-background: hsl(0 0% 100%);

			--main-width: 500px;
			--margin: 1.75rem;
			--padding: 1.5rem;
			--border-size: 1px;
			--border-radius: 0.5rem;
			--box-shadow: 0 0.5rem 1rem hsl(0 0% 0% / 0.15);
		}

		@media (prefers-color-scheme: dark) {
			:root {
				--body-color: hsl(210 14% 89%);
				--body-background: hsl(210 10% 23%);
				--border-color: hsla(0 0% 100% / 0.15);
				--main-background: hsl(210 11% 15%);
			}
		}

		*,
		*::before,
		*::after {
			box-sizing: border-box;
		}

		body {
			margin: 0;
			padding: var(--padding);

			color: var(--body-color);
			background-color: var(--body-background);

			font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", "Noto Sans", "Liberation Sans", Arial, sans-serif;
			font-size: 1rem;
			font-weight: 400;
			line-height: 1.5;
			text-align: center;
		}

		main {
			max-width: var(--main-width);
			margin: auto;
			margin-top: var(--margin);
			margin-bottom: var(--margin);
			padding: var(--padding);
			border: var(--border-size) solid var(--border-color);
			border-radius: var(--border-radius);
			box-shadow: var(--box-shadow);

			background-color: var(--main-background);
			background-clip: padding-box;
		}

		h1 {
			margin-top: 0;
			margin-bottom: 0.5rem;

			font-size: 1.25rem;
			font-weight: 500;
			line-height: 1.2;
		}

		p {
			margin-top: 0;
		}

		p:last-child {
			margin-bottom: 0;
		}

		small {
			font-size: 0.875rem;
		}
	</style>
</head>

<body>
	<main>
		<h1>{{ph "http.error.status_text"}}</h1>
		<p>Oops! We ran into some problems. Please try again later.</p>
		<p><small>{{ph "http.error.status_code"}} &mdash; {{ph "http.error.id"}}</small></p>
	</main>
</body>

</html>
