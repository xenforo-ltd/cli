services:
  xf:
    environment:
      XF_XFES_SEARCH_HOST: elasticsearch
    depends_on:
      - elasticsearch
    networks:
      - elasticsearch

  elasticsearch:
    image: elasticsearch:${ELASTICSEARCH_VERSION:-9.0.2}
    environment:
      discovery.type: single-node
      ELASTIC_USERNAME: ${XF_XFES_SEARCH_USER}
      ELASTIC_PASSWORD: ${XF_XFES_SEARCH_PASSWORD}
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    networks:
      - elasticsearch
    volumes:
      - elasticsearch:/usr/share/elasticsearch/data

networks:
  elasticsearch:

volumes:
  elasticsearch:
