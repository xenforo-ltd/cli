services:
  xf:
    image: xf:${XF_VERSION:-latest}
    build:
      context: .
      args:
        - PHP_VERSION=${PHP_VERSION:-8.4}
        - PHP_VERSION_COMPOSER=${PHP_VERSION_COMPOSER:-2.8}
        - PHP_VERSION_IGBINARY=${PHP_VERSION_IGBINARY:-3.2.16}
        - PHP_VERSION_IMAGICK=${PHP_VERSION_IMAGICK:-3.8.0}
        - PHP_VERSION_REDIS=${PHP_VERSION_REDIS:-6.2.0}
        - PHP_VERSION_XDEBUG=${PHP_VERSION_XDEBUG:-3.4.3}
        - PHP_VERSION_YAML=${PHP_VERSION_YAML:-2.2.4}
        - PHP_BUILD_IMAGICK=${XF_IMAGICK_ENABLE:-0}
        - PHP_INSTALL_FFMPEG=${XF_XFMG_FFMPEG_ENABLE:-0}
    environment:
      XF_DB_HOST: db
    env_file:
      - .env
    depends_on:
      - db
    networks:
      - web
      - db
    volumes:
      - xf:/var/www/html

  web:
    image: nginx:${NGINX_VERSION:-1.27}-alpine
    ports:
      - ${XF_PORT:-80}:80
    depends_on:
      - xf
    networks:
      - web
    volumes:
      - ./.docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - xf:/var/www/html:ro

  db:
    image: mariadb:${MARIADB_VERSION:-11.7}
    command:
      - mariadbd
      - --performance-schema=ON
      - --innodb-buffer-pool-size=256M
      - --innodb-log-file-size=64M
    environment:
      MARIADB_RANDOM_ROOT_PASSWORD: 1
      MARIADB_AUTO_UPGRADE: 1
      MARIADB_USER: ${XF_DB_USER}
      MARIADB_PASSWORD: ${XF_DB_PASSWORD}
      MARIADB_DATABASE: ${XF_DB_DATABASE}
    networks:
      - db
    volumes:
      - db:/var/lib/mysql

networks:
  web:
  db:

volumes:
  xf:
  db:
