services:
  xf:
    environment:
      XF_XFES_SEARCH_HOST: search
    depends_on:
      - search
    networks:
      - search

  search:
    image: elasticsearch:${ELASTICSEARCH_VERSION:-9.0.2}
    environment:
      discovery.type: single-node
      ELASTIC_USERNAME: ${XF_XFES_SEARCH_USER}
      ELASTIC_PASSWORD: ${XF_XFES_SEARCH_PASSWORD}
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    networks:
      - search
    volumes:
      - search:/usr/share/elasticsearch/data

networks:
  search:

volumes:
  search:
