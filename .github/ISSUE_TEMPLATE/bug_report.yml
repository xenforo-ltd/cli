name: Bug report
description: Report a reproducible problem
labels: [bug]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened and what did you expect?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include exact commands and relevant output.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: xf version
      description: Paste output of `xf version --json`
    validations:
      required: true
  - type: input
    id: platform
    attributes:
      label: OS/Architecture
      description: e.g. macOS 14 arm64
    validations:
      required: true
