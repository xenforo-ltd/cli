name: CI

on:
  workflow_dispatch:

  push:
    branches:
      - "main"
    paths:
      - "**.go"
      - .golangci.yml

  pull_request:
    branches:
      - "main"
    paths:
      - "**.go"
      - .golangci.yml

concurrency:
  group: "${{ github.workflow }}@${{ github.head_ref || github.ref_name }}"
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: blacksmith-4vcpu-ubuntu-2404

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"

      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11

  test:
    name: ${{ matrix.name }}
    runs-on: blacksmith-4vcpu-ubuntu-2404

    strategy:
      matrix:
        include:
          - name: Test
            command: make test
          - name: Test (race)
            command: make test-race
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"

      - name: ${{ matrix.name }}
        run: ${{ matrix.command }}

  test-coverage:
    name: Test (coverage)
    runs-on: blacksmith-4vcpu-ubuntu-2404

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"

      - name: Test coverage
        run: make test-coverage

      - name: Upload coverage report
        uses: codecov/codecov-action@v6
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_ORG_TOKEN }}
