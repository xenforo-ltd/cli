name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  quality:
    name: Quality Gate
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Check formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "The following files are not gofmt-formatted:"
            echo "$unformatted"
            exit 1
          fi

      - name: Go vet
        run: go vet ./...

      - name: Go test
        run: go test ./...

      - name: Go test (race)
        run: go test -race ./...

  build:
    name: Build ${{ matrix.os }}-${{ matrix.arch }}
    needs: quality
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
            runner: blacksmith-4vcpu-ubuntu-2404
            ext: tar.gz
          - os: linux
            arch: arm64
            runner: blacksmith-4vcpu-ubuntu-2404
            ext: tar.gz
          - os: darwin
            arch: amd64
            runner: macos-latest
            ext: tar.gz
          - os: darwin
            arch: arm64
            runner: macos-latest
            ext: tar.gz
          - os: windows
            arch: amd64
            runner: blacksmith-4vcpu-windows-2025
            ext: zip

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Get version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Get build date
        id: date
        shell: bash
        run: echo "DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT

      - name: Build binary
        shell: bash
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          COMMIT="${{ github.sha }}"
          DATE="${{ steps.date.outputs.DATE }}"

          LDFLAGS="-s -w"
          LDFLAGS="$LDFLAGS -X xf/internal/version.Version=$VERSION"
          LDFLAGS="$LDFLAGS -X xf/internal/version.Commit=$COMMIT"
          LDFLAGS="$LDFLAGS -X xf/internal/version.Date=$DATE"

          BINARY_NAME="xf"
          if [ "${{ matrix.os }}" = "windows" ]; then
            BINARY_NAME="xf.exe"
          fi

          go build -ldflags "$LDFLAGS" -o "$BINARY_NAME" .

      - name: Import signing certificate (macOS)
        if: matrix.os == 'darwin'
        shell: bash
        env:
          MACOS_CERT_P12_BASE64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
          MACOS_KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail

          if [ -z "${MACOS_CERT_P12_BASE64:-}" ] || [ -z "${MACOS_CERT_PASSWORD:-}" ] || [ -z "${MACOS_KEYCHAIN_PASSWORD:-}" ]; then
            echo "Missing one or more required macOS signing secrets."
            exit 1
          fi

          CERT_PATH="$RUNNER_TEMP/macos-signing-cert.p12"
          CERT_B64_PATH="$RUNNER_TEMP/macos-signing-cert.b64"
          KEYCHAIN_PATH="$RUNNER_TEMP/macos-signing.keychain-db"

          # Remove accidental whitespace/newlines from secret paste and decode with macOS base64.
          printf '%s' "$MACOS_CERT_P12_BASE64" | tr -d '[:space:]' > "$CERT_B64_PATH"
          if ! base64 -D -i "$CERT_B64_PATH" > "$CERT_PATH" 2>/dev/null; then
            echo "Failed to decode MACOS_CERT_P12_BASE64 as base64."
            echo "Re-generate with: base64 -i xenforo-cli.p12 | tr -d '\\n' | pbcopy"
            exit 1
          fi
          if [ ! -s "$CERT_PATH" ]; then
            echo "Decoded certificate file is empty."
            exit 1
          fi

          if ! openssl pkcs12 -in "$CERT_PATH" -passin "pass:${MACOS_CERT_PASSWORD}" -nokeys -clcerts -noout >/dev/null 2>&1; then
            echo "Decoded file is not a valid PKCS#12 bundle, or MACOS_CERT_PASSWORD is incorrect."
            exit 1
          fi

          security create-keychain -p "$MACOS_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$MACOS_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$MACOS_CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security -T /usr/bin/xcrun
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$MACOS_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"

          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Sign binary (macOS)
        if: matrix.os == 'darwin'
        shell: bash
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail

          if [ -z "${KEYCHAIN_PATH:-}" ]; then
            echo "Keychain path is not set."
            exit 1
          fi

          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep 'Developer ID Application' | head -n 1 | sed -E 's/.*"(.+)"/\1/')
          if [ -z "${IDENTITY:-}" ]; then
            echo "No Developer ID Application identity found in imported keychain."
            exit 1
          fi

          if [ -n "${APPLE_TEAM_ID:-}" ] && [[ "$IDENTITY" != *"(${APPLE_TEAM_ID})"* ]]; then
            echo "Found signing identity, but it does not match APPLE_TEAM_ID."
            echo "Identity: $IDENTITY"
            exit 1
          fi

          codesign --force --options runtime --timestamp --sign "$IDENTITY" xf
          codesign --verify --strict --verbose=2 xf
          codesign -dv --verbose=4 xf

      - name: Notarize binary (macOS)
        if: matrix.os == 'darwin'
        shell: bash
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_API_PRIVATE_KEY_P8_BASE64: ${{ secrets.APPLE_API_PRIVATE_KEY_P8_BASE64 }}
        run: |
          set -euo pipefail

          if [ -z "${APPLE_API_KEY_ID:-}" ] || [ -z "${APPLE_API_ISSUER_ID:-}" ] || [ -z "${APPLE_API_PRIVATE_KEY_P8_BASE64:-}" ]; then
            echo "Missing one or more required notarization secrets."
            exit 1
          fi

          NOTARY_KEY_B64_PATH="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.b64"
          NOTARY_KEY_PATH="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
          NOTARY_ZIP_PATH="$RUNNER_TEMP/xf-notary.zip"

          printf '%s' "$APPLE_API_PRIVATE_KEY_P8_BASE64" | tr -d '[:space:]' > "$NOTARY_KEY_B64_PATH"
          if ! base64 -D -i "$NOTARY_KEY_B64_PATH" > "$NOTARY_KEY_PATH" 2>/dev/null; then
            echo "Failed to decode APPLE_API_PRIVATE_KEY_P8_BASE64 as base64."
            exit 1
          fi
          if ! grep -q "BEGIN PRIVATE KEY" "$NOTARY_KEY_PATH"; then
            echo "Decoded notarization key is not a valid .p8 private key."
            exit 1
          fi
          chmod 600 "$NOTARY_KEY_PATH"

          ditto -c -k --keepParent xf "$NOTARY_ZIP_PATH"

          xcrun notarytool submit "$NOTARY_ZIP_PATH" \
            --key "$NOTARY_KEY_PATH" \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER_ID" \
            --wait

          spctl --assess --type exec -vv xf

      - name: Create archive (Unix)
        if: matrix.os != 'windows'
        shell: bash
        run: |
          ARCHIVE_NAME="xf-${{ steps.version.outputs.VERSION }}-${{ matrix.os }}-${{ matrix.arch }}.tar.gz"
          tar -czf "$ARCHIVE_NAME" xf
          echo "ARCHIVE_NAME=$ARCHIVE_NAME" >> $GITHUB_ENV

      - name: Create archive (Windows)
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          $ARCHIVE_NAME = "xf-${{ steps.version.outputs.VERSION }}-${{ matrix.os }}-${{ matrix.arch }}.zip"
          Compress-Archive -Path xf.exe -DestinationPath $ARCHIVE_NAME
          echo "ARCHIVE_NAME=$ARCHIVE_NAME" >> $env:GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: xf-${{ matrix.os }}-${{ matrix.arch }}
          path: xf-${{ steps.version.outputs.VERSION }}-${{ matrix.os }}-${{ matrix.arch }}.${{ matrix.ext }}
          retention-days: 1

  release:
    name: Create Release
    needs: build
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
