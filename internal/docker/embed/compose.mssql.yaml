services:
  xf:
    build:
      args:
        - PHP_BUILD_SQLSRV=1
    depends_on:
      - mssql
    networks:
      - mssql

  mssql:
    image: mcr.microsoft.com/mssql/server:${MSSQL_VERSION:-2025-latest}
    environment:
      ACCEPT_EULA: Y
      MSSQL_SA_PASSWORD: ${XF_MSSQL_PASSWORD:-Password123}
    networks:
      - mssql
    volumes:
      - mssql:/var/opt/mssql

networks:
  mssql:

volumes:
  mssql:
